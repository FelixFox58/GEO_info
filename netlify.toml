# Netlify configuration for GeoInfo

[build]
  publish = "."

# Protect /admin route - only you can access
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex"

# Cache geos.json for performance but allow revalidation
[[headers]]
  for = "/geos.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# Cache static assets
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
